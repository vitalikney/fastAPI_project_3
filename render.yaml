services:
  - type: web
    name: fastapi-shortener
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fastapi-shortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fastapi-shortener-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        value: https://fastapi-shortener.onrender.com
  - type: redis
    name: fastapi-shortener-redis
    plan: free
    ipAllowList: []

databases:
  - name: fastapi-shortener-db
    plan: free
